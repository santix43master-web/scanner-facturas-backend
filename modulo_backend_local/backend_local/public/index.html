<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R21 Backoffice</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f1923;
  --surface: #1a2d3d;
  --surface2: #243b4f;
  --border: #2a4359;
  --primary: #00bcd4;
  --primary-dim: rgba(0,188,212,0.15);
  --text: #e0e6ed;
  --text2: #8899a6;
  --danger: #ef5350;
  --success: #66bb6a;
  --warn: #ffa726;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
html, body { height: 100%; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }
body { display: flex; }

/* Sidebar */
.sidebar {
  width: 220px; background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0;
}
.sidebar-logo { font-size: 24px; font-weight: 800; color: var(--primary); padding: 0 20px 20px; letter-spacing: 2px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.sidebar-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.sidebar-link {
  display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer;
  color: var(--text2); font-size: 14px; font-weight: 500; transition: all 0.2s; border: none; background: none; width: 100%; text-align: left;
}
.sidebar-link:hover { background: var(--surface2); color: var(--text); }
.sidebar-link.active { background: var(--primary-dim); color: var(--primary); border-right: 3px solid var(--primary); }
.sidebar-link .icon { font-size: 18px; width: 24px; text-align: center; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text2); text-align: center; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  display: flex; align-items: center; justify-content: space-between; padding: 16px 28px;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.topbar h1 { font-size: 18px; font-weight: 700; }
.topbar-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); }
.topbar-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
.content { flex: 1; padding: 24px 28px; overflow-y: auto; display: none; }
.content.active { display: block; }

/* Search */
.search-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.search-bar input, .search-bar select {
  padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 14px; outline: none; transition: border 0.2s;
}
.search-bar input:focus, .search-bar select:focus { border-color: var(--primary); }
.search-bar input[type="text"] { flex: 1; min-width: 200px; }
.search-bar input[type="date"] { width: 150px; }
.search-bar button {
  padding: 10px 20px; border-radius: 8px; border: none; background: var(--primary); color: #0f1923;
  font-weight: 700; font-size: 14px; cursor: pointer; transition: opacity 0.2s;
}
.search-bar button:hover { opacity: 0.85; }
.search-bar button.secondary { background: var(--surface2); color: var(--text); }

/* Table */
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
thead th {
  background: var(--surface2); padding: 10px 14px; text-align: left; font-weight: 600;
  color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
  border-bottom: 1px solid var(--border); position: sticky; top: 0;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; cursor: pointer; }
tbody tr:hover { background: var(--surface2); }
tbody tr.selected { background: var(--primary-dim); }
tbody td { padding: 10px 14px; white-space: nowrap; }
tbody td .badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
}
.badge-active { background: rgba(102,187,106,0.15); color: var(--success); }
.badge-inactive { background: rgba(239,83,80,0.15); color: var(--danger); }
.badge-stock-bajo { background: rgba(255,167,38,0.15); color: var(--warn); }
.monto { font-family: 'JetBrains Mono', 'Consolas', monospace; text-align: right; }
.clickable { color: var(--primary); cursor: pointer; font-weight: 500; }
.clickable:hover { text-decoration: underline; }

/* Cards */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
.card-stat {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px; text-align: center;
}
.card-stat .num { font-size: 28px; font-weight: 800; color: var(--primary); }
.card-stat .label { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 28px; width: 100%; max-width: 520px; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow);
}
.modal h2 { font-size: 18px; margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; font-weight: 600; }
.form-group input, .form-group select {
  width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 14px; outline: none;
}
.form-group input:focus { border-color: var(--primary); }
.form-group input:disabled { opacity: 0.5; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
.form-actions button {
  padding: 10px 24px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer;
}
.btn-primary { background: var(--primary); color: #0f1923; }
.btn-secondary { background: var(--surface2); color: var(--text); }
.btn-danger { background: var(--danger); color: white; }

/* Scroll */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text2); }
.loading .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast {
  position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px;
  background: var(--surface); border: 1px solid var(--border); font-size: 13px; z-index: 1000;
  box-shadow: var(--shadow); animation: fadein 0.2s; max-width: 360px;
}
.toast.success { border-color: var(--success); }
.toast.error { border-color: var(--danger); }
@keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.empty { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">R21</div>
  <nav class="sidebar-nav">
    <button class="sidebar-link active" data-tab="resumen"><span class="icon">◆</span> Resumen</button>
    <button class="sidebar-link" data-tab="productos"><span class="icon">■</span> Productos</button>
    <button class="sidebar-link" data-tab="clientes"><span class="icon">●</span> Clientes</button>
    <button class="sidebar-link" data-tab="ventas"><span class="icon">▼</span> Ventas</button>
    <button class="sidebar-link" data-tab="backups"><span class="icon">⬡</span> Backups</button>
  </nav>
  <div class="sidebar-footer">R21 Backoffice v1.0</div>
</aside>

<div class="main">
  <div class="topbar">
    <h1 id="tabTitle">Resumen</h1>
    <div class="topbar-status">
      <span class="topbar-dot" id="statusDot"></span>
      <span id="statusText">Conectando...</span>
    </div>
  </div>

  <div class="content active" id="tab-resumen"></div>
  <div class="content" id="tab-productos"></div>
  <div class="content" id="tab-clientes"></div>
  <div class="content" id="tab-ventas"></div>
  <div class="content" id="tab-backups"></div>
</div>

<div id="modalContainer"></div>

<script>
const API = 'http://localhost:10001';
let currentTab = 'resumen';
let selectedRow = null;

// ─── Navigation ───
document.querySelectorAll('.sidebar-link').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-link').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    document.getElementById(`tab-${currentTab}`).classList.add('active');
    document.getElementById('tabTitle').textContent = btn.textContent.trim();
    loadTab(currentTab);
  });
});

// ─── Status ───
async function checkStatus() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  try {
    const r = await fetch(API);
    if (r.ok) { dot.style.background = 'var(--success)'; txt.textContent = 'Conectado'; }
    else { dot.style.background = 'var(--danger)'; txt.textContent = 'Error'; }
  } catch { dot.style.background = 'var(--danger)'; txt.textContent = 'Sin conexión'; }
}
setInterval(checkStatus, 10000); checkStatus();

// ─── Toast ───
function toast(msg, type = 'success') {
  const el = document.createElement('div'); el.className = `toast ${type}`; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ─── Fetch helper ───
async function api(path, opts = {}) {
  const r = await fetch(`${API}${path}`, { headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }, ...opts });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ─── Format ───
const fm = n => (n ?? 0).toLocaleString('es-PY');
const fmDate = s => s ? new Date(s).toLocaleDateString('es-PY') : '-';

// ─── Modal ───
function showModal(html) {
  const c = document.getElementById('modalContainer');
  c.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
}
function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

// ─── Tab Loaders ───
function loadTab(tab) {
  if (tab === 'resumen') loadResumen();
  else if (tab === 'productos') loadProductos();
  else if (tab === 'clientes') loadClientes();
  else if (tab === 'ventas') loadVentas();
  else if (tab === 'backups') loadBackups();
}

// ══════════════ RESUMEN ══════════════
async function loadResumen() {
  const el = document.getElementById('tab-resumen');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';
  try {
    const [prods, clientes, ventas, grupos] = await Promise.all([
      api('/bien-servicio?activo=S&_limit=1'), api('/clientes?activo=S&_limit=1'),
      api('/ventas?_limit=1'), api('/grupos'),
    ]);
    const totalProds = prods.total || 0;
    const totalClientes = clientes.total || 0;
    const totalVentas = ventas.total || 0;
    const totalGrupos = grupos.length || 0;

    // Get real totals via extra queries
    const [prodsFull, clientesFull] = await Promise.all([
      api('/bien-servicio?activo=S'), api('/clientes?activo=S'),
    ]);
    const stockBajo = (prodsFull.items || []).filter(i => (i.cant_existencia || 0) <= (i.existencia_minima || 0)).length;

    el.innerHTML = `
      <div class="cards">
        <div class="card-stat"><div class="num">${prodsFull.total}</div><div class="label">Productos Activos</div></div>
        <div class="card-stat"><div class="num">${totalGrupos}</div><div class="label">Grupos</div></div>
        <div class="card-stat"><div class="num">${clientesFull.total}</div><div class="label">Clientes Activos</div></div>
        <div class="card-stat"><div class="num">${stockBajo}</div><div class="label" style="color:var(--warn)">Stock Bajo</div></div>
      </div>
      <div class="cards">
        <div class="card-stat"><div class="num">${ventas.items?.length || 0}</div><div class="label">Últimas Ventas</div></div>
        <div class="card-stat"><div class="num">${new Date().toLocaleDateString('es-PY')}</div><div class="label">Fecha</div></div>
      </div>
      <div style="margin-top:20px;">
        <h3 style="font-size:14px;color:var(--text2);margin-bottom:12px;">Grupos</h3>
        <div class="table-wrap"><table>
          <thead><tr><th>Grupo</th><th>Descripción</th><th>Items</th></tr></thead>
          <tbody>${grupos.map(g => `<tr><td>${g.cod_grupo_bien_servicio}</td><td>${g.desc_grupo_bien_servicio}</td><td>${g.total_items}</td></tr>`).join('')}</tbody>
        </table></div>
      </div>`;
  } catch(e) { el.innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

// ══════════════ PRODUCTOS ══════════════
let prodSearchTerm = '', prodGrupo = '', prodActivo = '';
let prodData = [];

async function loadProductos() {
  const el = document.getElementById('tab-productos');
  const grupos = await api('/grupos');
  el.innerHTML = `
    <div class="search-bar">
      <input type="text" id="prodSearch" placeholder="Buscar por descripción, código o barra..." value="${prodSearchTerm}">
      <select id="prodGrupo"><option value="">Todos los grupos</option>${grupos.map(g => `<option value="${g.cod_grupo_bien_servicio}" ${prodGrupo == g.cod_grupo_bien_servicio?'selected':''}>${g.desc_grupo_bien_servicio}</option>`).join('')}</select>
      <select id="prodActivo"><option value="">Todos</option><option value="S" ${prodActivo=='S'?'selected':''}>Activos</option><option value="N" ${prodActivo=='N'?'selected':''}>Inactivos</option></select>
      <button onclick="searchProductos()">Buscar</button>
      <button class="secondary" onclick="prodSearchTerm='';prodGrupo='';prodActivo='';loadProductos()">Limpiar</button>
    </div>
    <div id="prodTableWrap"><div class="loading"><div class="spinner"></div>Cargando...</div></div>`;
  document.getElementById('prodSearch').addEventListener('keydown', e => { if(e.key === 'Enter') searchProductos(); });
  await searchProductos();
}

async function searchProductos() {
  prodSearchTerm = document.getElementById('prodSearch').value;
  prodGrupo = document.getElementById('prodGrupo').value;
  prodActivo = document.getElementById('prodActivo').value;
  const wrap = document.getElementById('prodTableWrap');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div>Buscando...</div>';
  try {
    const params = new URLSearchParams();
    if (prodSearchTerm) params.set('q', prodSearchTerm);
    if (prodGrupo) params.set('grupo', prodGrupo);
    if (prodActivo) params.set('activo', prodActivo);
    const res = await api(`/bien-servicio?${params}`);
    prodData = res.items || [];
    if (prodData.length === 0) { wrap.innerHTML = '<div class="empty">Sin resultados</div>'; return; }
    wrap.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Grupo</th><th>Código</th><th>Descripción</th><th>Cód. Barra</th><th>Costo</th><th>Venta</th><th>%</th><th>Stock</th><th>Min</th><th>Activo</th></tr></thead>
      <tbody>${prodData.map(p => {
        const stockBajo = (p.cant_existencia || 0) <= (p.existencia_minima || 0) && p.activo === 'S';
        return `<tr onclick="selectProd(this,'${p.cod_grupo_bien_servicio}','${p.cod_bien_servicio}')">
          <td>${p.cod_grupo_bien_servicio}</td><td>${p.cod_bien_servicio}</td>
          <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis">${p.desc_bien_servicio}</td>
          <td style="font-family:monospace">${p.codigo_barra || '-'}</td>
          <td class="monto">${fm(p.precio_costo)}</td><td class="monto">${fm(p.precio_venta)}</td>
          <td>${p.calc_porc || 0}%</td>
          <td class="monto"><span class="${stockBajo?'badge badge-stock-bajo':''}">${fm(p.cant_existencia)}</span></td>
          <td class="monto">${fm(p.existencia_minima)}</td>
          <td><span class="badge ${p.activo === 'S' ? 'badge-active' : 'badge-inactive'}">${p.activo === 'S' ? 'Sí' : 'No'}</span></td>
        </tr>`}).join('')}</tbody></table></div>
      <div style="margin-top:8px;font-size:12px;color:var(--text2);">${prodData.length} resultados</div>`;
    if (selectedRow) {
      const sel = document.querySelector(`[data-key="${selectedRow}"]`);
      if (sel) sel.classList.add('selected');
    }
  } catch(e) { wrap.innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

function selectProd(tr, grupo, codigo) {
  document.querySelectorAll('#prodTableWrap tbody tr').forEach(r => r.classList.remove('selected'));
  tr.classList.add('selected');
  selectedRow = `${grupo}-${codigo}`;
  tr.setAttribute('data-key', selectedRow);
  showEditProd(grupo, codigo);
}

function showEditProd(grupo, codigo) {
  const p = prodData.find(x => x.cod_grupo_bien_servicio == grupo && x.cod_bien_servicio == codigo);
  if (!p) return;
  showModal(`
    <h2>Editar Producto</h2>
    <div class="form-row">
      <div class="form-group"><label>Grupo</label><input value="${p.cod_grupo_bien_servicio}" disabled></div>
      <div class="form-group"><label>Código</label><input value="${p.cod_bien_servicio}" disabled></div>
    </div>
    <div class="form-group"><label>Descripción</label><input id="ep-desc" value="${p.desc_bien_servicio?.replace(/"/g,'&quot;') || ''}"></div>
    <div class="form-group"><label>Código Barra</label><input id="ep-bar" value="${p.codigo_barra || ''}"></div>
    <div class="form-row">
      <div class="form-group"><label>Precio Costo</label><input id="ep-costo" type="number" step="1" value="${p.precio_costo || 0}"></div>
      <div class="form-group"><label>Precio Venta</label><input id="ep-venta" type="number" step="1" value="${p.precio_venta || 0}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>% Margen</label><input id="ep-porc" type="number" step="0.01" value="${p.calc_porc || 0}"></div>
      <div class="form-group"><label>Stock</label><input id="ep-stock" type="number" step="1" value="${p.cant_existencia || 0}"></div>
    </div>
    <div class="form-group"><label>Stock Mínimo</label><input id="ep-min" type="number" step="1" value="${p.existencia_minima || 0}"></div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveProd(${grupo},${codigo})">Guardar</button>
    </div>`);
}

async function saveProd(grupo, codigo) {
  const body = {
    desc_bien_servicio: document.getElementById('ep-desc').value,
    codigo_barra: document.getElementById('ep-bar').value,
    precio_costo: parseFloat(document.getElementById('ep-costo').value) || 0,
    precio_venta: parseFloat(document.getElementById('ep-venta').value) || 0,
    calc_porc: parseFloat(document.getElementById('ep-porc').value) || 0,
    cant_existencia: parseInt(document.getElementById('ep-stock').value) || 0,
    existencia_minima: parseInt(document.getElementById('ep-min').value) || 0,
  };
  try {
    await api(`/bien-servicio/${grupo}/${codigo}`, { method: 'PUT', body: JSON.stringify(body) });
    toast('Producto actualizado');
    closeModal();
    searchProductos();
  } catch(e) { toast(`Error: ${e.message}`, 'error'); }
}

// ══════════════ CLIENTES ══════════════
let cliSearchTerm = '';
async function loadClientes() {
  const el = document.getElementById('tab-clientes');
  el.innerHTML = `
    <div class="search-bar">
      <input type="text" id="cliSearch" placeholder="Buscar por nombre, documento o celular..." value="${cliSearchTerm}">
      <button onclick="searchClientes()">Buscar</button>
      <button class="secondary" onclick="cliSearchTerm='';loadClientes()">Limpiar</button>
      <button onclick="showNewCliente()" style="background:var(--success);">+ Nuevo Cliente</button>
    </div>
    <div id="cliTableWrap"><div class="loading"><div class="spinner"></div>Cargando...</div></div>`;
  document.getElementById('cliSearch').addEventListener('keydown', e => { if(e.key === 'Enter') searchClientes(); });
  await searchClientes();
}

async function searchClientes() {
  cliSearchTerm = document.getElementById('cliSearch').value;
  const wrap = document.getElementById('cliTableWrap');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div>Buscando...</div>';
  try {
    const params = new URLSearchParams();
    if (cliSearchTerm) params.set('q', cliSearchTerm);
    const res = await api(`/clientes?${params}`);
    const items = res.items || [];
    if (items.length === 0) { wrap.innerHTML = '<div class="empty">Sin resultados</div>'; return; }
    wrap.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Código</th><th>Nombre</th><th>Documento</th><th>Dirección</th><th>Teléfono</th><th>Celular</th><th>Email</th><th>Activo</th></tr></thead>
      <tbody>${items.map(c => `<tr>
        <td>${c.cod_cliente}</td><td style="font-weight:500">${c.nom_cliente}</td>
        <td>${c.nro_documento || '-'}</td><td>${c.dir_cliente || '-'}</td>
        <td>${c.tel_cliente || '-'}</td><td>${c.cel_cliente || '-'}</td>
        <td style="font-size:12px">${c.email_cliente || '-'}</td>
        <td><span class="badge ${c.activo === 'S' ? 'badge-active' : 'badge-inactive'}">${c.activo === 'S' ? 'Sí' : 'No'}</span></td>
      </tr>`).join('')}</tbody></table></div>
      <div style="margin-top:8px;font-size:12px;color:var(--text2);">${items.length} resultados</div>`;
  } catch(e) { wrap.innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

function showNewCliente() {
  showModal(`
    <h2>Nuevo Cliente</h2>
    <div class="form-group"><label>Nombre *</label><input id="nc-nom" placeholder="Nombre completo"></div>
    <div class="form-group"><label>Documento</label><input id="nc-doc" placeholder="RUC o CI"></div>
    <div class="form-group"><label>Dirección</label><input id="nc-dir" placeholder="Dirección"></div>
    <div class="form-row">
      <div class="form-group"><label>Teléfono</label><input id="nc-tel" placeholder="Teléfono fijo"></div>
      <div class="form-group"><label>Celular</label><input id="nc-cel" placeholder="Celular"></div>
    </div>
    <div class="form-group"><label>Email</label><input id="nc-email" placeholder="correo@ejemplo.com"></div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveCliente()">Guardar</button>
    </div>`);
}

async function saveCliente() {
  const nom = document.getElementById('nc-nom').value.trim();
  if (!nom) { toast('Nombre es requerido', 'error'); return; }
  try {
    await api('/clientes', {
      method: 'POST',
      body: JSON.stringify({
        nom_cliente: nom,
        nro_documento: document.getElementById('nc-doc').value.trim() || null,
        dir_cliente: document.getElementById('nc-dir').value.trim() || null,
        tel_cliente: document.getElementById('nc-tel').value.trim() || null,
        cel_cliente: document.getElementById('nc-cel').value.trim() || null,
        email_cliente: document.getElementById('nc-email').value.trim() || null,
      }),
    });
    toast('Cliente creado');
    closeModal();
    searchClientes();
  } catch(e) { toast(`Error: ${e.message}`, 'error'); }
}

// ══════════════ VENTAS ══════════════
async function loadVentas() {
  const el = document.getElementById('tab-ventas');
  const hoy = new Date().toISOString().split('T')[0];
  const hace7 = new Date(Date.now() - 7*86400000).toISOString().split('T')[0];
  el.innerHTML = `
    <div class="search-bar">
      <input type="date" id="vDesde" value="${hace7}">
      <input type="date" id="vHasta" value="${hoy}">
      <input type="text" id="vSearch" placeholder="N° factura o cliente...">
      <button onclick="searchVentas()">Buscar</button>
      <button class="secondary" onclick="document.getElementById('vSearch').value='';searchVentas()">Limpiar</button>
    </div>
    <div id="ventasTableWrap"><div class="loading"><div class="spinner"></div>Cargando...</div></div>`;
  document.getElementById('vSearch').addEventListener('keydown', e => { if(e.key === 'Enter') searchVentas(); });
  await searchVentas();
}

async function searchVentas() {
  const wrap = document.getElementById('ventasTableWrap');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div>Buscando...</div>';
  try {
    const params = new URLSearchParams();
    const desde = document.getElementById('vDesde').value;
    const hasta = document.getElementById('vHasta').value;
    const q = document.getElementById('vSearch').value;
    if (desde) params.set('desde', desde);
    if (hasta) params.set('hasta', hasta);
    if (q) params.set('q', q);
    const res = await api(`/ventas?${params}`);
    const items = res.items || [];
    if (items.length === 0) { wrap.innerHTML = '<div class="empty">Sin resultados</div>'; return; }
    wrap.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Fecha</th><th>N° Factura</th><th>Cliente</th><th>Total</th><th>Pagado</th><th>Saldo</th><th>Estado</th></tr></thead>
      <tbody>${items.map(v => `
        <tr class="venta-row" onclick='showDetalleVenta(${JSON.stringify(v).replace(/'/g,"&#39;")})'>
          <td>${fmDate(v.fecha_comprobante)}</td>
          <td class="clickable">${v.nro_comprobante_venta}</td>
          <td>${v.nom_cliente || '-'}</td>
          <td class="monto">${fm(v.total_comprobante)}</td>
          <td class="monto">${fm(v.monto_pagado)}</td>
          <td class="monto">${fm(v.saldo_comprobante)}</td>
          <td>${v.anulado === 'S' ? '<span class="badge badge-inactive">Anulado</span>' : '<span class="badge badge-active">Normal</span>'}</td>
        </tr>`).join('')}</tbody></table></div>
        <div style="margin-top:8px;font-size:12px;color:var(--text2);">${items.length} resultados</div>`;
  } catch(e) { wrap.innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

async function showDetalleVenta(v) {
  try {
    const res = await api(`/ventas/${v.cod_comprobante_venta}/${v.nro_lote}/${v.nro_comprobante_venta}/${v.cod_empresa}/${v.cod_comprobante_venta}/detalle`);
    // Recalculate with correct params from actual data structure
    const comp = v.cod_comprobante_venta;
    const lote = v.nro_lote;
    const nro = v.nro_comprobante_venta;
    const agencia = 1;
    const timbrado = v.cod_comprobante_venta;
    const res2 = await api(`/ventas/${comp}/${lote}/${nro}/${agencia}/${timbrado}/detalle`);
    const items = res2.items || [];
    let filas = items.map(d => `<tr>
      <td>${d.nro_secuencia}</td><td>${d.desc_bien_servicio || '-'}</td>
      <td>${d.cantidad_venta}</td><td class="monto">${fm(d.precio_unitario_venta)}</td>
      <td class="monto">${fm(d.total_venta)}</td>
      <td class="monto">${fm(d.monto_iva)}</td>
      <td class="monto">${fm(d.monto_descuentos)}</td>
    </tr>`).join('');
    showModal(`<h2>Detalle Venta #${v.nro_comprobante_venta}</h2>
      <div style="margin-bottom:16px;">
        <div style="font-size:13px;color:var(--text2);">Cliente: <strong style="color:var(--text)">${v.nom_cliente || '-'}</strong></div>
        <div style="font-size:13px;color:var(--text2);">Fecha: <strong style="color:var(--text)">${fmDate(v.fecha_comprobante)}</strong></div>
        <div style="font-size:13px;color:var(--text2);">Total: <strong style="color:var(--primary)">Gs ${fm(v.total_comprobante)}</strong></div>
      </div>
      ${items.length ? `<div class="table-wrap" style="max-height:300px;overflow-y:auto;"><table>
        <thead><tr><th>#</th><th>Producto</th><th>Cant</th><th>Precio</th><th>Total</th><th>IVA</th><th>Dto</th></tr></thead>
        <tbody>${filas}</tbody></table></div>` : '<div class="empty">Sin detalle</div>'}
      <div class="form-actions"><button class="btn-secondary" onclick="closeModal()">Cerrar</button></div>`);
  } catch(e) { toast(`Error: ${e.message}`, 'error'); }
}

// ══════════════ BACKUPS ══════════════
const DIAS_OPTS = [
  {v:'L',l:'Lunes'},{v:'M',l:'Martes'},{v:'X',l:'Miércoles'},
  {v:'J',l:'Jueves'},{v:'V',l:'Viernes'},{v:'S',l:'Sábado'},{v:'D',l:'Domingo'}
];

async function loadBackups() {
  const el = document.getElementById('tab-backups');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';
  try {
    const [cfg, files] = await Promise.all([api('/backup-config'), api('/backup-files')]);
    const totalSize = (files.files || []).reduce((s, f) => s + f.size, 0);
    const lastBackup = files.files?.[0]?.date ? new Date(files.files[0].date).toLocaleString('es-PY') : 'Nunca';
    const taskStatus = await checkTaskStatus();

    el.innerHTML = `
      <div class="cards">
        <div class="card-stat"><div class="num">${files.files?.length || 0}</div><div class="label">Backups</div></div>
        <div class="card-stat"><div class="num">${(totalSize / 1024 / 1024).toFixed(1)} MB</div><div class="label">Total</div></div>
        <div class="card-stat"><div class="num">${lastBackup}</div><div class="label">Último backup</div></div>
        <div class="card-stat"><div class="num" style="color:${taskStatus === 'Listo' ? 'var(--success)' : 'var(--warn)'}">${taskStatus}</div><div class="label">Tarea Windows</div></div>
      </div>

      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;">
        <h3 style="font-size:16px;margin-bottom:20px;">⚙ Configuración</h3>
        <div class="form-row">
          <div class="form-group"><label>Hora del backup</label>
            <input type="time" id="bk-hora" value="${cfg.hora || '03:00'}">
          </div>
          <div class="form-group"><label>Máximo de backups a conservar</label>
            <input type="number" id="bk-max" min="1" max="365" value="${cfg.maxBackups || 30}">
          </div>
        </div>
        <div class="form-group"><label>Días de la semana</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;">
            ${DIAS_OPTS.map(d => `
              <label style="display:flex;align-items:center;gap:4px;padding:6px 12px;background:${(cfg.dias||[]).includes(d.v)?'var(--primary)':'var(--surface2)'};border-radius:6px;cursor:pointer;font-size:13px;color:${(cfg.dias||[]).includes(d.v)?'#0f1923':'var(--text)'};font-weight:600;">
                <input type="checkbox" value="${d.v}" ${(cfg.dias||[]).includes(d.v)?'checked':''} style="display:none">
                ${d.l}
              </label>
            `).join('')}
          </div>
        </div>
        <div class="form-actions" style="margin-top:16px;">
          <button class="btn-primary" onclick="saveBackupConfig()">Guardar Configuración</button>
          <button class="btn-secondary" onclick="runBackupNow()">Ejecutar Backup Ahora</button>
        </div>
      </div>

      <h3 style="font-size:14px;color:var(--text2);margin-bottom:12px;">Backups Guardados</h3>
      <div id="bk-file-list">
        ${(files.files || []).length === 0 ? '<div class="empty">Sin backups aún</div>' : `
        <div class="table-wrap"><table>
          <thead><tr><th>Archivo</th><th>Fecha</th><th>Tamaño</th></tr></thead>
          <tbody>${files.files.map(f => `
            <tr>
              <td style="font-family:monospace;font-size:12px;">${f.name}</td>
              <td>${new Date(f.date).toLocaleString('es-PY')}</td>
              <td class="monto">${(f.size / 1024 / 1024).toFixed(2)} MB</td>
            </tr>
          `).join('')}</tbody></table></div>
        `}
      </div>`;

    // Toggle checkbox styles
    document.querySelectorAll('#tab-backups input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', () => {
        const lbl = cb.closest('label');
        if (cb.checked) { lbl.style.background = 'var(--primary)'; lbl.style.color = '#0f1923'; }
        else { lbl.style.background = 'var(--surface2)'; lbl.style.color = 'var(--text)'; }
      });
    });
  } catch(e) { el.innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

async function checkTaskStatus() {
  try {
    const r = await fetch(`http://localhost:10001/backup-files`);
    return 'Listo';
  } catch { return 'Sin conexión'; }
}

async function saveBackupConfig() {
  const hora = document.getElementById('bk-hora').value;
  const maxBackups = parseInt(document.getElementById('bk-max').value) || 30;
  const dias = [...document.querySelectorAll('#tab-backups input[type="checkbox"]:checked')].map(cb => cb.value);
  if (dias.length === 0) { toast('Seleccioná al menos un día', 'error'); return; }
  try {
    const res = await api('/backup-config', {
      method: 'PUT',
      body: JSON.stringify({ hora, maxBackups, dias }),
    });
    toast('Configuración guardada' + (res.taskWarning ? ' (aviso: ' + res.taskWarning + ')' : ''));
    loadBackups();
  } catch(e) { toast(`Error: ${e.message}`, 'error'); }
}

async function runBackupNow() {
  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Ejecutando...';
  try {
    await api('/backup-run', { method: 'POST' });
    toast('Backup iniciado en segundo plano...');
    setTimeout(() => { loadBackups(); }, 5000);
  } catch(e) { toast(`Error: ${e.message}`, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Ejecutar Backup Ahora'; }
}

// ─── Init ───
loadResumen();
</script>
</body>
</html>
