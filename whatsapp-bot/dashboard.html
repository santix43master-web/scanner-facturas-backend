<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Facturas R21 - Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes glow{0%,100%{box-shadow:0 0 5px rgba(99,102,241,.3)}50%{box-shadow:0 0 25px rgba(99,102,241,.6)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#e0e0e0;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 20% 50%,rgba(99,102,241,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(168,85,247,.08) 0%,transparent 50%);pointer-events:none;z-index:0}
.nav{background:rgba(15,12,41,.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(99,102,241,.2);padding:16px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100;animation:slideDown .6s ease}
.nav h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav a{color:#c4b5fd;text-decoration:none;font-size:13px;padding:7px 16px;border-radius:20px;background:rgba(99,102,241,.12);transition:all .3s;border:1px solid transparent}
.nav a:hover{background:rgba(99,102,241,.25);border-color:rgba(99,102,241,.3);transform:translateY(-1px);box-shadow:0 4px 15px rgba(99,102,241,.2)}
.nav a.active{background:rgba(99,102,241,.3);border-color:#818cf8;color:#e0e7ff}
.nav .suc{font-size:12px;color:#a78bfa;margin-left:auto;padding:4px 12px;background:rgba(99,102,241,.1);border-radius:20px;border:1px solid rgba(99,102,241,.15)}
#login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:999;animation:fadeIn .5s ease}
#login-box{background:linear-gradient(145deg,rgba(30,27,75,.95),rgba(20,18,60,.95));backdrop-filter:blur(20px);border-radius:24px;padding:40px;width:90%;max-width:380px;text-align:center;border:1px solid rgba(99,102,241,.2);box-shadow:0 30px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);animation:slideDown .7s ease}
#login-box h2{font-size:28px;font-weight:800;background:linear-gradient(135deg,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
#login-box .sub{color:#94a3b8;font-size:14px;margin-bottom:28px}
#login-box input{width:100%;padding:14px 18px;background:rgba(255,255,255,.05);border:2px solid rgba(99,102,241,.2);border-radius:14px;font-size:15px;outline:0;color:#e0e0e0;transition:all .3s;margin-bottom:16px}
#login-box input:focus{border-color:#818cf8;box-shadow:0 0 20px rgba(99,102,241,.2);background:rgba(255,255,255,.08)}
#login-box input::placeholder{color:#64748b}
#login-box button{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:0;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(99,102,241,.3)}
#login-box button:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(99,102,241,.4)}
#login-box .error{color:#f87171;font-size:13px;margin-top:10px;display:none}
.container{max-width:1200px;margin:0 auto;padding:24px;position:relative;z-index:1}
.tabs{margin-bottom:20px;display:flex;gap:6px;flex-wrap:wrap;animation:fadeIn .8s ease}
.tab{padding:10px 22px;cursor:pointer;border-radius:12px;font-size:13px;font-weight:600;color:#94a3b8;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);transition:all .3s}
.tab:hover{background:rgba(99,102,241,.15);color:#e0e7ff;border-color:rgba(99,102,241,.2)}
.tab.active{background:linear-gradient(135deg,rgba(99,102,241,.25),rgba(139,92,246,.15));color:#e0e7ff;border-color:#818cf8;box-shadow:0 0 20px rgba(99,102,241,.15)}
.tab-content{display:none;animation:fadeIn .5s ease}
.tab-content.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:linear-gradient(145deg,rgba(30,27,75,.6),rgba(20,18,60,.4));backdrop-filter:blur(12px);border-radius:16px;padding:22px;border:1px solid rgba(99,102,241,.12);transition:all .4s;animation:fadeIn .6s ease backwards;position:relative;overflow:hidden}
.card:nth-child(1){animation-delay:.1s}
.card:nth-child(2){animation-delay:.2s}
.card:nth-child(3){animation-delay:.3s}
.card:nth-child(4){animation-delay:.4s}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#6366f1,#a78bfa,#ec4899);opacity:0;transition:opacity .4s}
.card:hover::before{opacity:1}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.3);border-color:rgba(99,102,241,.25)}
.card .label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.card .value{font-size:26px;font-weight:800;background:linear-gradient(135deg,#e0e7ff,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.card .sub{font-size:12px;color:#64748b;margin-top:2px}
.card .icon{font-size:28px;position:absolute;top:14px;right:16px;opacity:.15}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:768px){.grid2{grid-template-columns:1fr}}
.section{background:linear-gradient(145deg,rgba(30,27,75,.5),rgba(20,18,60,.3));backdrop-filter:blur(12px);border-radius:16px;padding:22px;border:1px solid rgba(99,102,241,.1);margin-bottom:16px;animation:fadeIn .6s ease}
.section h2{font-size:15px;font-weight:700;color:#c4b5fd;margin-bottom:16px;display:flex;align-items:center;gap:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:12px 10px;color:#94a3b8;font-weight:600;border-bottom:1px solid rgba(99,102,241,.15);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{padding:10px;border-bottom:1px solid rgba(255,255,255,.04);color:#cbd5e1}
tr:hover td{background:rgba(99,102,241,.06)}
.search{margin-bottom:16px}
.search input{width:100%;padding:12px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(99,102,241,.15);border-radius:12px;font-size:14px;outline:0;color:#e0e0e0;transition:all .3s}
.search input:focus{border-color:#818cf8;box-shadow:0 0 15px rgba(99,102,241,.12)}
.search input::placeholder{color:#64748b}
.precio{color:#a78bfa;font-weight:600}
.fecha{color:#64748b;font-size:12px}
.loading{text-align:center;padding:40px;color:#64748b;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:10px}
.loading::after{content:'';width:30px;height:30px;border:3px solid rgba(99,102,241,.15);border-top:3px solid #818cf8;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:#f87171;text-align:center;padding:20px}
.vacio{text-align:center;padding:30px;color:#64748b;font-size:14px}
.chart-container{position:relative;height:260px;animation:fadeIn .8s ease}
.detalle-card{background:linear-gradient(145deg,rgba(99,102,241,.1),rgba(139,92,246,.05));border-radius:12px;padding:18px;margin:8px 0;border:1px solid rgba(99,102,241,.12)}
.detalle-card h4{color:#e0e7ff;margin-bottom:10px;font-size:15px}
.detalle-card .info{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px}
.detalle-card .info span{color:#94a3b8}
.btn{display:inline-block;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;text-decoration:none;transition:all .3s;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 4px 15px rgba(99,102,241,.25)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(99,102,241,.35)}
.btn-ghost{color:#a78bfa;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.15)}
.btn-ghost:hover{background:rgba(99,102,241,.2);transform:translateY(-1px)}
.footer{text-align:center;padding:30px 20px;color:#64748b;font-size:13px;border-top:1px solid rgba(99,102,241,.08);margin-top:30px;animation:fadeIn 1s ease}
.footer a{color:#a78bfa;text-decoration:none;font-weight:600}
.footer a:hover{color:#c4b5fd}
.footer .heart{color:#ec4899;display:inline-block;animation:pulse 1.5s ease infinite}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:rgba(15,12,41,.5)}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,.3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(99,102,241,.5)}
</style>
</head>
<body>
<div id="login-overlay">
<div id="login-box">
<h2>✨ Facturas R21</h2>
<p class="sub">Ingresá tu sucursal para ver las facturas</p>
<input type="text" id="sucursal-input" placeholder="Ej: Minimarket LF" onkeydown="if(event.key==='Enter')ingresar()">
<button onclick="ingresar()">Entrar 🚀</button>
<div class="error" id="login-error"></div>
</div>
</div>
<nav class="nav">
<h1>📊 Facturas R21</h1>
<a href="#" onclick="showTab('dashboard')">Dashboard</a>
<a href="#" onclick="showTab('facturas')">Facturas</a>
<a href="#" onclick="showTab('precios')">Precios</a>
<a href="#" onclick="showTab('archivos')">Archivos</a>
<span class="suc" id="nav-sucursal"></span>
</nav>
<div class="container">
<div class="tabs">
<span class="tab active" onclick="showTab('dashboard')" data-tab="dashboard">📊 Dashboard</span>
<span class="tab" onclick="showTab('facturas')" data-tab="facturas">🧾 Facturas</span>
<span class="tab" onclick="showTab('precios')" data-tab="precios">🏷️ Precios</span>
<span class="tab" onclick="showTab('archivos')" data-tab="archivos">📁 Archivos</span>
</div>

<div id="tab-dashboard" class="tab-content active">
<div class="cards" id="resumen-cards"></div>
<div class="grid2">
<div class="section"><h2>📈 Gastos por Vendedor</h2><div class="chart-container"><canvas id="chart-vendedor"></canvas></div></div>
<div class="section"><h2>📅 Gastos por Mes</h2><div class="chart-container"><canvas id="chart-mes"></canvas></div></div>
</div>
<div class="section"><h2>📋 Últimas Facturas</h2><div id="ultimas-facturas"></div></div>
</div>

<div id="tab-facturas" class="tab-content">
<div class="search"><input type="text" id="search-factura" placeholder="🔍 Buscar por vendedor, número..." oninput="filtrarFacturas()"></div>
<div id="lista-facturas"></div>
</div>

<div id="tab-precios" class="tab-content">
<div class="search"><input type="text" id="search-producto" placeholder="🔍 Buscar producto..." oninput="buscarProducto()"></div>
<div id="resultados-precios"></div>
</div>

<div id="tab-archivos" class="tab-content">
<div id="lista-archivos"></div>
</div>
</div>

<div class="footer">
Hecho con <span class="heart">❤️</span> · ¿Necesitás ayuda? <a href="https://wa.me/595981644728">Soporte 0981 644 728</a>
</div>

<script>
const BACKEND = 'https://scanner-facturas-backend.onrender.com';
let todasFacturas = [];
let sucursal = '';

const SUCURSALES = ['Minimarket LF', 'Local 1'];

let cache = null;

function ingresar() {
  const val = document.getElementById('sucursal-input').value.trim();
  const err = document.getElementById('login-error');
  const encontrada = SUCURSALES.find(s => s.toLowerCase() === val.toLowerCase());
  if (!encontrada) { err.textContent = '❌ Esa sucursal no existe'; err.style.display = 'block'; return; }
  err.style.display = 'none';
  sucursal = encontrada;
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('nav-sucursal').textContent = '📍 ' + encontrada;
  cargarTodo();
}

async function cargarTodo() {
  cache = { archivos: [], facturas: {}, resumen: [] };
  const enc = encodeURIComponent(sucursal);
  const hist = await fetchJSON(BACKEND + '/historial/' + enc);
  cache.resumen = hist?.facturas || [];
  cache.archivos = (hist?.facturas || []).map(f => f.id + '.json');
  const botData = await fetchJSON('/api/facturas/' + enc);
  if (botData) {
    for (const k of Object.keys(botData)) {
      if (!cache.archivos.includes(k)) cache.archivos.push(k);
      cache.facturas[k] = botData[k];
      if (!cache.resumen.find(r => r.id === k.replace('.json',''))) {
        const d = botData[k];
        cache.resumen.push({
          id: k.replace('.json',''), vendedor: d.nombreVendedor || '?',
          numero: d.numeroFactura || '?', total: d.totalGeneral || 0,
          fecha: d.fechaEmision || '?', items: (d.items||[]).length,
        });
      }
    }
  }
  cargarDashboard();
}

async function obtenerFactura(nombre) {
  if (cache.facturas[nombre]) return cache.facturas[nombre];
  const f = await fetchJSON('/api/descargar/' + sucursal + '/' + encodeURIComponent(nombre));
  if (f && !f.error) { f._nombre = nombre; cache.facturas[nombre] = f; }
  return f;
}

function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.nav a').forEach(e => e.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
  const link = document.querySelector(`.nav a[onclick*="'${name}'"]`);
  if (link) link.classList.add('active');
  if (!cache && name !== 'dashboard') { cargarTodo(); return; }
  if (name === 'dashboard') cargarDashboard();
  if (name === 'facturas') cargarFacturas();
  if (name === 'precios') { cargarPrecios(); }
  if (name === 'archivos') cargarArchivos();
}

async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    return await r.json();
  } catch { return null; }
}

function n(n) { return Number(n || 0).toLocaleString() + ' Gs'; }

let chartVendedor = null, chartMes = null;

async function cargarDashboard() {
  if (!cache) { document.getElementById('resumen-cards').innerHTML = '<div class="vacio">Sin datos</div>'; return; }
  const facturas = cache.resumen;
  document.getElementById('resumen-cards').innerHTML = `
    <div class="card"><div class="icon">🧾</div><div class="label">Facturas</div><div class="value">${facturas.length}</div></div>
    <div class="card"><div class="icon">💰</div><div class="label">Total General</div><div class="value" id="total-general">...</div></div>
    <div class="card"><div class="icon">📊</div><div class="label">Promedio</div><div class="value" id="promedio">...</div></div>
    <div class="card"><div class="icon">🏆</div><div class="label">Top Vendedor</div><div class="value" id="top-vendedor">...</div><div class="sub" id="top-monto"></div></div>`;

  let total = 0; let porVendedor = {}; let porMes = {};
  for (const f of facturas) {
    const monto = Number(f.total || 0);
    total += monto;
    porVendedor[f.vendedor || 'Desconocido'] = (porVendedor[f.vendedor || 'Desconocido'] || 0) + monto;
    const mes = f.fecha ? f.fecha.slice(0,7) : '?';
    porMes[mes] = (porMes[mes] || 0) + monto;
  }

  const prom = facturas.length ? Math.round(total / facturas.length) : 0;
  document.getElementById('total-general').textContent = n(total);
  document.getElementById('promedio').textContent = n(prom);

  const sortedV = Object.entries(porVendedor).sort((a,b) => b[1]-a[1]);
  if (sortedV.length) {
    document.getElementById('top-vendedor').textContent = sortedV[0][0];
    document.getElementById('top-monto').textContent = n(sortedV[0][1]);
  }

  if (chartVendedor) chartVendedor.destroy();
  chartVendedor = new Chart(document.getElementById('chart-vendedor'), {
    type: 'doughnut',
    data: {
      labels: sortedV.slice(0,6).map(e => e[0]),
      datasets: [{ data: sortedV.slice(0,6).map(e => e[1]), backgroundColor: ['#6366f1','#8b5cf6','#a78bfa','#c084fc','#e879f9','#ec4899'] }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11 } } } } }
  });

  const sortedM = Object.entries(porMes).sort((a,b) => a[0].localeCompare(b[0]));
  if (chartMes) chartMes.destroy();
  chartMes = new Chart(document.getElementById('chart-mes'), {
    type: 'bar',
    data: {
      labels: sortedM.map(e => e[0]),
      datasets: [{ label: 'Gs', data: sortedM.map(e => e[1]), backgroundColor: '#818cf8', borderRadius: 6 }]
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { color: '#64748b', callback: v => v.toLocaleString() } }, x: { ticks: { color: '#64748b' } } }, plugins: { legend: { display: false } } }
  });

  const ultimas = facturas.sort((a,b) => (b.fecha||'').localeCompare(a.fecha||'')).slice(0,10);
  document.getElementById('ultimas-facturas').innerHTML = ultimas.length
    ? `<table><tr><th>Vendedor</th><th>N° Factura</th><th>Total</th><th>Fecha</th><th>Items</th></tr>${ultimas.map(f => `<tr><td>${f.vendedor||'?'}</td><td>${f.numero||'?'}</td><td class="precio">${n(f.total)}</td><td class="fecha">${f.fecha||'?'}</td><td>${f.items||0}</td></tr>`).join('')}</table>`
    : '<div class="vacio">No hay facturas</div>';
}

async function cargarFacturas() {
  if (!cache) { document.getElementById('lista-facturas').innerHTML = '<div class="vacio">No hay facturas</div>'; return; }
  todasFacturas = cache.resumen;
  todasFacturas.sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
  mostrarFacturas(todasFacturas);
}

function mostrarFacturas(lista) {
  document.getElementById('lista-facturas').innerHTML = lista.length
    ? `<table><tr><th>Vendedor</th><th>N° Factura</th><th>Total</th><th>Fecha</th><th>Items</th><th></th></tr>${lista.map(f => `<tr><td>${f.vendedor||'?'}</td><td>${f.numero||'?'}</td><td class="precio">${n(f.total)}</td><td class="fecha">${f.fecha||'?'}</td><td>${f.items||0}</td><td><a href="#" onclick="verDetalle(event,'${f.id||''}')" class="btn btn-ghost" style="padding:4px 12px;font-size:11px">Ver</a></td></tr>`).join('')}</table>`
    : '<div class="vacio">No se encontraron facturas</div>';
}

function filtrarFacturas() {
  const q = document.getElementById('search-factura').value.toLowerCase();
  const filtradas = todasFacturas.filter(f =>
    (f.vendedor||'').toLowerCase().includes(q) ||
    (f.numero||'').toLowerCase().includes(q) ||
    (f.fecha||'').includes(q)
  );
  mostrarFacturas(filtradas);
}

async function verDetalle(e, id) {
  e.preventDefault();
  const nombre = id + '.json';
  const data = await obtenerFactura(nombre);
  if (!data) return;
  const items = data.items || [];
  document.getElementById('lista-facturas').innerHTML = `
    <div class="detalle-card">
      <h4>${data.nombreVendedor||'?'} · Factura N° ${data.numeroFactura||'?'}</h4>
      <div class="info">
        <span>RUC:</span> ${data.rucVendedor||'?'}<br>
        <span>Timbrado:</span> ${data.timbrado||'?'}<br>
        <span>Fecha:</span> ${data.fechaEmision||'?'}<br>
        <span>Total:</span> ${n(data.totalGeneral)}
      </div>
    </div>
    <table><tr><th>#</th><th>Código</th><th>Descripción</th><th>Cant</th><th>Precio</th><th>Subtotal</th></tr>
    ${items.map((it,i) => `<tr><td>${i+1}</td><td>${it.codigo||it.codigo_barras||'-'}</td><td>${it.descripcion||'?'}</td><td>${it.cantidad||1}</td><td class="precio">${n(it.precio_unitario)}</td><td class="precio">${n(it.subtotal)}</td></tr>`).join('')}
    </table>
    <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
      <a href="#" onclick="cargarFacturas(); return false;" class="btn btn-ghost">← Volver</a>
      <a href="/api/descargar/${sucursal}/${encodeURIComponent(nombre)}" target="_blank" class="btn btn-primary">⬇ JSON</a>
      <a href="/pdf/${sucursal}/${encodeURIComponent(nombre)}" target="_blank" class="btn btn-primary">⬇ PDF</a>
    </div>`;
}

// Precios
let todosProductos = [];
let timerPrecios = null;

async function cargarPrecios() {
  document.getElementById('resultados-precios').innerHTML = '<div class="loading">Cargando productos...</div>';
  if (!cache) { document.getElementById('resultados-precios').innerHTML = '<div class="vacio">Sin datos</div>'; return; }
  todosProductos = [];
  for (const f of Object.values(cache.facturas)) {
    if (!f.items) continue;
    for (const it of f.items) {
      todosProductos.push({
        descripcion: it.descripcion, precio: it.precio_unitario || it.precioUnitario || 0,
        vendedor: f.nombreVendedor||'?', fecha: f.fechaEmision||'?'
      });
    }
  }
  const unicos = new Map();
  for (const r of todosProductos) { const k = r.descripcion.toLowerCase().trim(); if (!unicos.has(k)) unicos.set(k, r); }
  mostrarPrecios(unicos);
}

function mostrarPrecios(unicos) {
  const q = document.getElementById('search-producto').value.toLowerCase();
  const filtrados = q ? [...unicos.values()].filter(r => r.descripcion.toLowerCase().includes(q)) : [...unicos.values()];
  document.getElementById('resultados-precios').innerHTML = filtrados.length
    ? `<table><tr><th>Producto</th><th>Precio</th><th>Vendedor</th><th>Fecha</th></tr>${filtrados.map(r => `<tr><td>${r.descripcion}</td><td class="precio">${n(r.precio)}</td><td>${r.vendedor}</td><td class="fecha">${r.fecha}</td></tr>`).join('')}</table>`
    : '<div class="vacio">No se encontraron productos</div>';
}

function buscarProducto() {
  if (todosProductos.length === 0) { cargarPrecios(); return; }
  const unicos = new Map();
  for (const r of todosProductos) { const k = r.descripcion.toLowerCase().trim(); if (!unicos.has(k)) unicos.set(k, r); }
  mostrarPrecios(unicos);
}

// Archivos
async function cargarArchivos() {
  document.getElementById('lista-archivos').innerHTML = '<div class="loading">Cargando...</div>';
  if (!cache) { document.getElementById('lista-archivos').innerHTML = '<div class="vacio">No hay archivos</div>'; return; }
  document.getElementById('lista-archivos').innerHTML =
    `<table><tr><th>Archivo</th><th></th></tr>${cache.archivos.map(a => `
      <tr><td>${a}</td>
      <td style="text-align:right">
      <a href="/api/descargar/${sucursal}/${encodeURIComponent(a)}" target="_blank" class="btn btn-primary" style="padding:4px 12px;font-size:11px;margin-right:6px">⬇ JSON</a>
      <a href="/pdf/${sucursal}/${encodeURIComponent(a)}" target="_blank" class="btn btn-primary" style="padding:4px 12px;font-size:11px;margin-right:6px">⬇ PDF</a>
      <a href="/ver-json/${sucursal}/${encodeURIComponent(a)}" target="_blank" class="btn btn-ghost" style="padding:4px 12px;font-size:11px">👁 Ver</a>
    </td></tr>`).join('')}</table>`;
}
</script>
