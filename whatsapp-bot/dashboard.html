<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Facturas R21 - Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:#f0f2f5;color:#333}
.nav{background:#1a237e;color:#fff;padding:16px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.nav h1{font-size:20px;font-weight:600}
.nav a{color:#fff;text-decoration:none;font-size:14px;  padding:6px 14px;border-radius:8px;background:rgba(255,255,255,.12)}
.nav a:hover{background:rgba(255,255,255,.2)}
.nav .suc{font-size:13px;color:#90caf9;margin-left:auto}
#login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:999}
#login-box{background:#fff;border-radius:16px;padding:32px;width:90%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
#login-box h2{color:#1a237e;margin-bottom:8px;font-size:20px}
#login-box p{color:#78909c;font-size:14px;margin-bottom:20px}
#login-box select{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;outline:0;margin-bottom:16px;background:#fff;cursor:pointer}
#login-box select:focus{border-color:#1a237e}
#login-box input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;outline:0;margin-bottom:16px;background:#fff}
#login-box input:focus{border-color:#1a237e}
#login-box button{width:100%;padding:12px;background:#1a237e;color:#fff;border:0;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
#login-box button:hover{background:#283593}
#login-box .error{color:#e74c3c;font-size:13px;margin-top:8px;display:none}
.nav .badge{background:#00bcd4;color:#000;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:6px}
.container{max-width:1200px;margin:0 auto;padding:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card .label{font-size:12px;color:#78909c;text-transform:uppercase;letter-spacing:.5px}
.card .value{font-size:28px;font-weight:700;margin-top:6px;color:#1a237e}
.card .sub{font-size:13px;color:#90a4ae;margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:768px){.grid2{grid-template-columns:1fr}}
.section{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px}
.section h2{font-size:16px;color:#1a237e;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 8px;color:#78909c;font-weight:600;border-bottom:2px solid #e8eaf6}
td{padding:10px 8px;border-bottom:1px solid #f0f0f0}
tr:hover{background:#f5f7ff}
.search{margin-bottom:16px}
.search input{width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:0}
.search input:focus{border-color:#1a237e}
.precio{color:#1a237e;font-weight:600}
.fecha{color:#90a4ae;font-size:12px}
.tab{display:inline-block;padding:8px 20px;cursor:pointer;border-radius:8px 8px 0 0;font-size:14px;color:#78909c;background:#e8eaf6;margin-right:4px}
.tab.active{background:#1a237e;color:#fff}
.tabs{margin-bottom:0}
.tab-content{display:none}
.tab-content.active{display:block}
.loading{text-align:center;padding:40px;color:#90a4ae;font-size:14px}
.error{color:#e74c3c;text-align:center;padding:20px}
.vacio{text-align:center;padding:30px;color:#90a4ae;font-size:14px}
.chart-container{position:relative;height:260px}
.detalle-card{background:#f5f7ff;border-radius:8px;padding:16px;margin:8px 0}
.detalle-card h4{color:#1a237e;margin-bottom:8px}
.detalle-card .info{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:13px}
.detalle-card .info span{color:#78909c}
</style>
</head>
<body>
<div id="login-overlay">
<div id="login-box">
<h2>Facturas R21</h2>
<p>Seleccioná tu sucursal para ver las facturas</p>
<input type="text" id="sucursal-input" placeholder="Sucursal" onkeydown="if(event.key==='Enter')ingresar()">
<button onclick="ingresar()">Entrar</button>
<div class="error" id="login-error"></div>
</div>
</div>
<nav class="nav">
<h1>Facturas R21</h1>
<a href="#" onclick="showTab('dashboard')" id="tab-dashboard-link">Dashboard</a>
<a href="#" onclick="showTab('facturas')" id="tab-facturas-link">Facturas</a>
<a href="#" onclick="showTab('precios')" id="tab-precios-link">Precios</a>
<a href="#" onclick="showTab('archivos')" id="tab-archivos-link">Archivos</a>
<span class="suc" id="nav-sucursal"></span>
</nav>
<div class="container">
<div class="tabs">
<span class="tab active" onclick="showTab('dashboard')" data-tab="dashboard">Dashboard</span>
<span class="tab" onclick="showTab('facturas')" data-tab="facturas">Facturas</span>
<span class="tab" onclick="showTab('precios')" data-tab="precios">Precios</span>
<span class="tab" onclick="showTab('archivos')" data-tab="archivos">Archivos</span>
</div>

<div id="tab-dashboard" class="tab-content active">
<div class="cards" id="resumen-cards"></div>
<div class="grid2">
<div class="section"><h2>Gastos por Vendedor</h2><div class="chart-container"><canvas id="chart-vendedor"></canvas></div></div>
<div class="section"><h2>Gastos por Mes</h2><div class="chart-container"><canvas id="chart-mes"></canvas></div></div>
</div>
<div class="section"><h2>Últimas Facturas</h2><div id="ultimas-facturas"></div></div>
</div>

<div id="tab-facturas" class="tab-content">
<div class="search"><input type="text" id="search-factura" placeholder="Buscar por vendedor, número..." oninput="filtrarFacturas()"></div>
<div id="lista-facturas"></div>
</div>

<div id="tab-precios" class="tab-content">
<div class="search"><input type="text" id="search-producto" placeholder="Buscar producto..." oninput="buscarProducto()"></div>
<div id="resultados-precios"></div>
</div>

<div id="tab-archivos" class="tab-content">
<div id="lista-archivos"></div>
</div>
</div>

<script>
const BACKEND = 'https://scanner-facturas-backend.onrender.com';
let todasFacturas = [];
let sucursal = '';

const SUCURSALES = ['Minimarket LF', 'Local 1'];

function ingresar() {
  const val = document.getElementById('sucursal-input').value.trim();
  const err = document.getElementById('login-error');
  const encontrada = SUCURSALES.find(s => s.toLowerCase() === val.toLowerCase());
  if (!encontrada) { err.textContent = 'Esa sucursal no existe'; err.style.display = 'block'; return; }
  err.style.display = 'none';
  sucursal = encontrada.replace(' ', '_');
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('nav-sucursal').textContent = encontrada;
  cargarDashboard();
}

function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
  if (name === 'dashboard') cargarDashboard();
  if (name === 'facturas') cargarFacturas();
  if (name === 'precios') { if (document.getElementById('search-producto').value) buscarProducto(); }
  if (name === 'archivos') cargarArchivos();
}

async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    return await r.json();
  } catch { return null; }
}

function n(n) { return Number(n || 0).toLocaleString() + ' Gs'; }

// Dashboard
async function cargarDashboard() {
  const data = await fetchJSON(BACKEND + '/listar/' + sucursal');
  if (!data || !data.archivos) { document.getElementById('resumen-cards').innerHTML = '<div class="vacio">No hay datos</div>'; return; }
  const archivos = data.archivos || [];
  document.getElementById('resumen-cards').innerHTML = `
    <div class="card"><div class="label">Facturas</div><div class="value">${archivos.length}</div></div>
    <div class="card"><div class="label">Total General</div><div class="value" id="total-general">...</div></div>
    <div class="card"><div class="label">Promedio</div><div class="value" id="promedio">...</div></div>
    <div class="card"><div class="label">Top Vendedor</div><div class="value" id="top-vendedor">...</div><div class="sub" id="top-monto"></div></div>`;

  let total = 0; let facturas = []; let porVendedor = {}; let porMes = {};
  for (const a of archivos.slice(-50)) {
    const f = await fetchJSON(BACKEND + '/descargar/' + sucursal + '/' + encodeURIComponent(a));
    if (!f) continue;
    facturas.push(f);
    const monto = Number(f.totalGeneral || 0);
    total += monto;
    const v = f.nombreVendedor || 'Desconocido';
    porVendedor[v] = (porVendedor[v] || 0) + monto;
    const mes = f.fechaEmision ? f.fechaEmision.slice(0,7) : '?';
    porMes[mes] = (porMes[mes] || 0) + monto;
  }

  const prom = facturas.length ? Math.round(total / facturas.length) : 0;
  document.getElementById('total-general').textContent = n(total);
  document.getElementById('promedio').textContent = n(prom);

  const sortedV = Object.entries(porVendedor).sort((a,b) => b[1]-a[1]);
  if (sortedV.length) {
    document.getElementById('top-vendedor').textContent = sortedV[0][0];
    document.getElementById('top-monto').textContent = n(sortedV[0][1]);
  }

  new Chart(document.getElementById('chart-vendedor'), {
    type: 'doughnut',
    data: {
      labels: sortedV.slice(0,6).map(e => e[0]),
      datasets: [{ data: sortedV.slice(0,6).map(e => e[1]), backgroundColor: ['#1a237e','#283593','#3949ab','#5c6bc0','#7986cb','#9fa8da'] }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } }
  });

  const sortedM = Object.entries(porMes).sort((a,b) => a[0].localeCompare(b[0]));
  new Chart(document.getElementById('chart-mes'), {
    type: 'bar',
    data: {
      labels: sortedM.map(e => e[0]),
      datasets: [{ label: 'Gs', data: sortedM.map(e => e[1]), backgroundColor: '#3949ab', borderRadius: 6 }]
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString() } } }, plugins: { legend: { display: false } } }
  });

  const ultimas = facturas.sort((a,b) => (b.fechaEmision||'').localeCompare(a.fechaEmision||'')).slice(0,10);
  document.getElementById('ultimas-facturas').innerHTML = ultimas.length
    ? `<table><tr><th>Vendedor</th><th>N° Factura</th><th>Total</th><th>Fecha</th><th>Items</th></tr>${ultimas.map(f => `<tr><td>${f.nombreVendedor||'?'}</td><td>${f.numeroFactura||'?'}</td><td class="precio">${n(f.totalGeneral)}</td><td class="fecha">${f.fechaEmision||'?'}</td><td>${(f.items||[]).length}</td></tr>`).join('')}</table>`
    : '<div class="vacio">No hay facturas</div>';
}

// Facturas
async function cargarFacturas() {
  document.getElementById('lista-facturas').innerHTML = '<div class="loading">Cargando...</div>';
  const data = await fetchJSON(BACKEND + '/listar/' + sucursal');
  if (!data || !data.archivos) { document.getElementById('lista-facturas').innerHTML = '<div class="vacio">No hay facturas</div>'; return; }
  todasFacturas = [];
  for (const a of data.archivos) {
    const f = await fetchJSON(BACKEND + '/descargar/' + sucursal + '/' + encodeURIComponent(a));
    if (f) { f._nombre = a; todasFacturas.push(f); }
  }
  todasFacturas.sort((a,b) => (b.fechaEmision||'').localeCompare(a.fechaEmision||''));
  mostrarFacturas(todasFacturas);
}

function mostrarFacturas(lista) {
  document.getElementById('lista-facturas').innerHTML = lista.length
    ? `<table><tr><th>Vendedor</th><th>N° Factura</th><th>Total</th><th>Fecha</th><th>Items</th><th></th></tr>${lista.map(f => `<tr><td>${f.nombreVendedor||'?'}</td><td>${f.numeroFactura||'?'}</td><td class="precio">${n(f.totalGeneral)}</td><td class="fecha">${f.fechaEmision||'?'}</td><td>${(f.items||[]).length}</td><td><a href="#" onclick="verDetalle(event,'${f._nombre||''}')" style="color:#1a237e;font-size:12px">Ver</a></td></tr>`).join('')}</table>`
    : '<div class="vacio">No se encontraron facturas</div>';
}

function filtrarFacturas() {
  const q = document.getElementById('search-factura').value.toLowerCase();
  const filtradas = todasFacturas.filter(f =>
    (f.nombreVendedor||'').toLowerCase().includes(q) ||
    (f.numeroFactura||'').toLowerCase().includes(q) ||
    (f.fechaEmision||'').includes(q)
  );
  mostrarFacturas(filtradas);
}

async function verDetalle(e, nombre) {
  e.preventDefault();
  const data = await fetchJSON(BACKEND + '/descargar/' + sucursal + '/' + encodeURIComponent(nombre));
  if (!data) return;
  const items = data.items || [];
  document.getElementById('lista-facturas').innerHTML = `
    <div class="detalle-card">
      <h4>${data.nombreVendedor||'?'} - Factura N° ${data.numeroFactura||'?'}</h4>
      <div class="info">
        <span>RUC:</span> ${data.rucVendedor||'?'}<br>
        <span>Timbrado:</span> ${data.timbrado||'?'}<br>
        <span>Fecha:</span> ${data.fechaEmision||'?'}<br>
        <span>Total:</span> ${n(data.totalGeneral)}
      </div>
    </div>
    <table><tr><th>#</th><th>Código</th><th>Descripción</th><th>Cant</th><th>Precio</th><th>Subtotal</th></tr>
    ${items.map((it,i) => `<tr><td>${i+1}</td><td>${it.codigo||it.codigo_barras||'-'}</td><td>${it.descripcion||'?'}</td><td>${it.cantidad||1}</td><td class="precio">${n(it.precio_unitario)}</td><td class="precio">${n(it.subtotal)}</td></tr>`).join('')}
    </table>
    <div style="margin-top:12px"><a href="#" onclick="cargarFacturas(); return false;" style="color:#1a237e">← Volver</a></div>`;
}

// Precios
let timerPrecios = null;
function buscarProducto() {
  clearTimeout(timerPrecios);
  const q = document.getElementById('search-producto').value.trim();
  if (!q) { document.getElementById('resultados-precios').innerHTML = ''; return; }
  timerPrecios = setTimeout(async () => {
    document.getElementById('resultados-precios').innerHTML = '<div class="loading">Buscando...</div>';
  const data = await fetchJSON(BACKEND + '/listar/' + sucursal);
    if (!data || !data.archivos) { document.getElementById('resultados-precios').innerHTML = '<div class="vacio">Sin datos</div>'; return; }
    const busq = q.toLowerCase();
    const resultados = [];
    for (const a of data.archivos.slice(-50)) {
      const f = await fetchJSON(BACKEND + '/descargar/' + sucursal + '/' + encodeURIComponent(a));
      if (!f || !f.items) continue;
      for (const it of f.items) {
        if ((it.descripcion||'').toLowerCase().includes(busq)) {
          resultados.push({
            descripcion: it.descripcion, precio: it.precio_unitario || it.precioUnitario || 0,
            vendedor: f.nombreVendedor||'?', fecha: f.fechaEmision||'?'
          });
        }
      }
    }
    const unicos = new Map();
    for (const r of resultados) { const k = r.descripcion.toLowerCase().trim(); if (!unicos.has(k)) unicos.set(k, r); }
    document.getElementById('resultados-precios').innerHTML = unicos.size
      ? `<table><tr><th>Producto</th><th>Precio</th><th>Vendedor</th><th>Fecha</th></tr>${[...unicos.values()].map(r => `<tr><td>${r.descripcion}</td><td class="precio">${n(r.precio)}</td><td>${r.vendedor}</td><td class="fecha">${r.fecha}</td></tr>`).join('')}</table>`
      : '<div class="vacio">No se encontraron productos</div>';
  }, 400);
}

// Archivos
async function cargarArchivos() {
  document.getElementById('lista-archivos').innerHTML = '<div class="loading">Cargando...</div>';
  const data = await fetchJSON(BACKEND + '/listar/' + sucursal');
  if (!data || !data.archivos) { document.getElementById('lista-archivos').innerHTML = '<div class="vacio">No hay archivos</div>'; return; }
  document.getElementById('lista-archivos').innerHTML =
    `<table><tr><th>Archivo</th><th></th></tr>${data.archivos.map(a => `
      <tr><td>${a}</td>
      <td style="text-align:right">
        <a href="${BACKEND}/descargar/${sucursal}/${encodeURIComponent(a)}" target="_blank" style="color:#1a237e;font-size:12px;margin-right:10px">⬇ JSON</a>
        <a href="/ver-json/${encodeURIComponent(a)}" target="_blank" style="color:#1a237e;font-size:12px">👁 Ver</a>
      </td></tr>`).join('')}</table>`;
}

// Init - nada, espera el login
</script>
</body>
</html>
